<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karim Sabri — Testeur QA</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0e0e0e;
    --white: #f7f5f2;
    --accent: #c8a96e;
    --accent-light: #e8d9b8;
    --grey: #6b6b6b;
    --grey-light: #e2dfd9;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--black);
    font-size: 15px;
    line-height: 1.65;
    overflow-x: hidden;
  }

  .sidebar {
    position: fixed;
    top: 0; left: 0;
    width: 300px;
    height: 100vh;
    background: var(--black);
    color: var(--white);
    display: flex;
    flex-direction: column;
    padding: 3rem 2.4rem;
    z-index: 10;
    overflow-y: auto;

    /* Animation ajoutée */
    animation: sidebarFade 0.8s ease forwards;
    opacity: 0;
  }

  @keyframes sidebarFade {
    to { opacity: 1; }
  }

  .sidebar-photo {
    width: 90px; height: 90px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    margin-bottom: 1.6rem;
  }

  .sidebar-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.55rem;
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: .3rem;
  }

  .sidebar-title {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: .6rem;
  }

  .sidebar-tagline {
    font-size: .82rem;
    color: #aaa;
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 2rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .sidebar-section {
    margin-bottom: 2rem;
  }

  .sidebar-section-title {
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  .contact-item {
    display: flex;
    align-items: flex-start;
    gap: .6rem;
    font-size: .82rem;
    color: #ccc;
    margin-bottom: .6rem;
  }

  .contact-item svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    margin-top: 2px;
    opacity: .6;
  }

  .contact-email {
    color: #ccc;
    text-decoration: none;
  }

  /* ===== LINKEDIN AJOUT ===== */
  .linkedin-item {
    position: relative;
    overflow: hidden;
  }

  .linkedin-link {
    position: relative;
    color: #ccc;
    text-decoration: none;
    transition: color .3s ease, transform .3s ease;
  }

  .linkedin-link::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -2px;
    width: 0%;
    height: 1px;
    background: #0A66C2;
    transition: width .35s ease;
  }

  .linkedin-icon {
    transition: transform .3s ease, color .3s ease;
    color: #ccc;
  }

  .linkedin-item:hover .linkedin-link {
    color: #0A66C2;
    transform: translateX(3px);
  }

  .linkedin-item:hover .linkedin-link::after {
    width: 100%;
  }

  .linkedin-item:hover .linkedin-icon {
    transform: scale(1.2);
    color: #0A66C2;
  }
  /* ========================== */

  .skill-bar-wrap { margin-bottom: 1rem; }

  .skill-label {
    font-size: .78rem;
    color: #ccc;
    display: flex;
    justify-content: space-between;
    margin-bottom: .3rem;
  }

  .skill-track {
    height: 2px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }

  .skill-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 1.2s cubic-bezier(.16,1,.3,1);
  }

  .soft-skill-tag {
    display: inline-block;
    font-size: .72rem;
    background: #1e1e1e;
    color: #bbb;
    border: 1px solid #2e2e2e;
    padding: .2rem .65rem;
    border-radius: 20px;
    margin: 0 .25rem .35rem 0;
    line-height: 1.6;
  }

  .nav-links {
    display: flex;
    flex-direction: column;
    gap: .3rem;
    margin-top: auto;
    padding-top: 2rem;
    border-top: 1px solid #2a2a2a;
  }

  .nav-link {
    font-size: .78rem;
    color: #666;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    letter-spacing: .05em;
    transition: color .2s;
    cursor: pointer;
  }

  .nav-link:hover, .nav-link.active { color: var(--accent); }

  .main {
    margin-left: 300px;
    min-height: 100vh;
  }
</style>
</head>

<body>

<aside class="sidebar">

  <img class="sidebar-photo" src="photo.jpg" alt="Karim Sabri">

  <div class="sidebar-name">Karim Sabri</div>
  <div class="sidebar-title">Testeur QA</div>
  <div class="sidebar-tagline">Motivé par la curiosité, expert par passion, engagé par conviction</div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">Contact</div>

    <div class="contact-item">
      📞 06 29 18 40 81
    </div>

    <div class="contact-item">
      📧 <span id="contact-email"></span>
    </div>

    <!-- ===== LINKEDIN AJOUT ===== -->
    <div class="contact-item linkedin-item">
      <svg class="linkedin-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20.447 20.452H16.9v-5.569c0-1.328-.025-3.036-1.849-3.036-1.851 0-2.134 1.445-2.134 2.939v5.666H9.368V9h3.414v1.561h.049c.476-.9 1.637-1.849 3.37-1.849 3.604 0 4.27 2.372 4.27 5.456v6.284zM5.337 7.433a1.986 1.986 0 110-3.972 1.986 1.986 0 010 3.972zM6.993 20.452H3.679V9h3.314v11.452z"/>
      </svg>
      <a href="https://linkedin.com/in/karim-sabri-11548a141" target="_blank" class="linkedin-link">
        LinkedIn
      </a>
    </div>
    <!-- ========================== -->

    <div class="contact-item">
      📍 BOURGUÉBUS 14540
    </div>

  </div>

</aside>

<script>
(function() {
  var u = 'sabri.karim144';
  var d = 'gmail.com';
  var e = u + '@' + d;
  document.getElementById('contact-email').innerHTML =
    '<a href="mailto:' + e + '">' + e + '</a>';
})();
</script>

</body>
</html>
